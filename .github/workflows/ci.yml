name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true
    
    - name: test
      run: go test -v ./analyzer/...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true
    
    - name: build
      run: go build -o linterlog ./cmd/
    
    - name: artifact
      uses: actions/upload-artifact@v4  # ← v4
      with:
        name: linterlog
        path: linterlog