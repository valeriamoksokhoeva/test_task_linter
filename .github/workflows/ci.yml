name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true
    
    - name: Run tests
      run: go test -v ./analyzer/...

  build:
    runs-on: ubuntu-latest
    needs: test  
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true
    
    - name: Build
      run: go build -v -o linterlog ./cmd/
    
    - name: Add to artifacts
      uses: actions/upload-artifact@v3
      with:
        name: linterlog
        path: linterlog